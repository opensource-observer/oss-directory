version: 7
name: fastasr-chenkui164
display_name: Fastasr Chenkui164
description:
  这是一个用C++实现ASR推理的项目，它依赖很少，安装也很简单，推理速度很快，在树莓派4B等ARM平台也可以流畅的运行。 支持的模型是由Google的Transformer模型中优化而来，数据集是开源wenetspeech(10000+小时)或阿里私有数据集(60000+小时)，
  所以识别效果也很好，可以媲美许多商用的ASR软件。
github:
  - url: https://github.com/chenkui164/FastASR
