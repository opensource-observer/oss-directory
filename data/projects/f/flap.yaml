name: flap
display_name: Flap
description: Flap (flap.sh) is a one-click memecoin creation and trading platform. Creators can launch a token instantly onto an automated bonding curve, with optional "tax token" support that routes a configurable trading fee (1%, 3%, 5%, or 10%) directly back to the token's creator - marketed as letting "creators earn forever" via a revenue-sharing feature called FLAPSHARE. Once a token's market cap crosses a threshold, liquidity migrates automatically to PancakeSwap V3, where holders can also stake LP tokens to earn BNB rewards. Flap originated from an ETHGlobal hackathon win and launched in June 2024; it is led by CEO Cedric (@eth_Cedric) and is one of several bonding-curve memecoin launchpads on BNB Chain, alongside Four.meme and GraFun.
