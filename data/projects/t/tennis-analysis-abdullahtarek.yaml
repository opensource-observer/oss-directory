description:
  This project analyzes Tennis players in a video to measure their speed, ball shot
  speed and number of shots. This project will detect players and the tennis ball
  using YOLO and also utilizes CNNs to extract court keypoints. This hands on project
  is perfect for polishing your machine learning, and computer vision skills.
