version: 7
name: torch-conv-kan-ivandrokin
display_name: Torch Conv Kan Ivandrokin
description:
  This project is dedicated to the implementation and research of Kolmogorov-Arnold
  convolutional networks. The repository includes implementations of 1D, 2D, and 3D
  convolutions with different kernels, ResNet-like and DenseNet-like models, training
  code based on accelerate/PyTorch, as well as scripts for experiments with CIFAR-10
  and Tiny ImageNet.
github:
  - url: https://github.com/IvanDrokin/torch-conv-kan
