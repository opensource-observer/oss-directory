version: 7
name: tndpay
display_name: TND Payments
description: TND Payments is a decentralized project focused on creating a
  universal payment system that connects various wallets, tokens, and networks.
  It aims to facilitate cryptocurrency payments at physical stores using NFC
  technology, allowing users and merchants to transact with their preferred
  tokens without third-party services. The platform also supports token bridging
  and swapping, with future plans for QR code functionality to enhance
  convenience.
