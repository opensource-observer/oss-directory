name: thorchain
display_name: THORChain
description:
  THORChain is a cross‑chain liquidity protocol built on the Cosmos SDK that enables native asset swaps across blockchains without wrapped tokens.
  It uses continuous liquidity pools (CLPs) and a bonded RUNE security model to secure assets and facilitate trustless swapping.
