name: tulpea
display_name: Tulpea
description: Tulpea is a decentralized credit infrastructure that enables onchain underwriting of real-world assets, allowing users to access structured debt and yield backed by cash-flowing assets like real estate. It replaces traditional banks by separating ownership and debt, using curated risk assessment and aligned incentives to offer transparent, overcollateralized, and amortizing lending opportunities.
