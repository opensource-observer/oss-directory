display_name: Online 3D Bpp Pct Alexfrom0815
description:
  Code implementation of "Learning Efficient Online 3D Bin Packing on Packing
  Configuration Trees". We propose to enhance the practical applicability of online
  3D Bin Packing Problem (BPP) via learning on a hierarchical packing configuration
  tree which makes the deep reinforcement learning (DRL) model easy to deal with practical
  constraints and well-performing even with continuous solution space.
