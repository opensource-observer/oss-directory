version: 7
name: onnx2tf-pinto0309
display_name: Onnx2Tf Pinto0309
description:
  A tool for converting ONNX files to LiteRT/TFLite/TensorFlow, PyTorch
  native code (nn.Module), TorchScript (.pt), state_dict (.pt), Exported Program (.pt2),
  and Dynamo ONNX. It also supports direct conversion from LiteRT to PyTorch.
github:
  - url: https://github.com/PINTO0309/onnx2tf
