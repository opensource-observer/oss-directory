version: 7
name: openviking-volcengine
display_name: Openviking Volcengine
description:
  OpenViking is an open-source context database designed specifically for
  AI Agents(such as openclaw). OpenViking unifies the management of context (memory,
  resources, and skills) that Agents need through a file system paradigm, enabling
  hierarchical context delivery and self-evolving.
github:
  - url: https://github.com/volcengine/OpenViking
