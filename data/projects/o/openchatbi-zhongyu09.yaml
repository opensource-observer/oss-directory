description:
  OpenChatBI is an intelligent chat-based BI tool powered by large language models,
  designed to help users query, analyze, and visualize data through natural language
  conversations. It uses LangGraph and LangChain to build chat agent and workflows
  that support natural language to SQL conversion and data analysis.
