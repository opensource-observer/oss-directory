name: soulbound-finance
display_name: Soulbound Finance
description: Soulbound Finance enables compliant private payments by separating identity from redemption. Depositors are identity-linked via non-transferable Soulbound Tokens and ZKP commitments. Recipients redeem anonymously via One-Time-Use (OTU) bearer codes — no on-chain link between depositor and redeemer.
