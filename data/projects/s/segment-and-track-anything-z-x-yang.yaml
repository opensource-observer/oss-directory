name: segment-and-track-anything-z-x-yang
display_name: Segment And Track Anything Z X Yang
description:
  An open-source project dedicated to tracking and segmenting any objects
  in videos, either automatically or interactively. The primary algorithms utilized
  include the Segment Anything Model (SAM) for key-frame segmentation and Associating
  Objects with Transformers (AOT) for efficient tracking and propagation purposes.
