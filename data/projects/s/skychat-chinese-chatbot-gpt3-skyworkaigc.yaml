description:
  SkyChat是一款基于中文GPT-3 api的聊天机器人项目。它可以像chatGPT一样，实现人机聊天、问答、中英文互译、对对联、写古诗等任务。|
  SkyChat is a Chatbot project based on Chinese GPT3 API. Like chatGPT, it can do
  human-machine chat, question and answer, and can also complete tasks such as Chinese-English
  or English-Chinese translation, content continuation, couplets, and Chinese ancient
  poems writing.
