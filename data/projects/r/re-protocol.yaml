version: 7
name: re-protocol
display_name: Re Protocol
description: Re Protocol is an internet-native marketplace for insurance capital that channels onchain stablecoin deposits into fully collateralized reinsurance treaties via Insurance Capital Layers. Depositors mint yield-bearing tokens (reUSD senior tranche, reUSDe junior tranche) and earn returns from reinsurance premiums plus idle-asset yield. RE is the ERC-20 governance token, issued by the Resilience Foundation with operating partner Cover Re.
