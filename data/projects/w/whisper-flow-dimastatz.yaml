description:
  "Whisper-Flow is a framework designed to enable real-time transcription of audio content\
  \ using OpenAI\u2019s Whisper model. Rather than processing entire files after upload\
  \ (\u201Cbatch mode\u201D), Whisper-Flow accepts a continuous stream of audio chunks\
  \ and produces incremental transcripts immediately."
