version: 7
name: wilmerai-someoddcodeguy
display_name: Wilmerai Someoddcodeguy
description:
  WilmerAI is one of the oldest LLM semantic routers. It uses multi-layer
  prompt routing and complex workflows to allow you to not only create practical chatbots,
  but to extend any kind of application that connects to an LLM via REST API. Wilmer
  sits between your app and your many LLM APIs, so that you can manipulate prompts
  as needed.
