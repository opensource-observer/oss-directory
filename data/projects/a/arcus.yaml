description: Arcus (arcus.xyz) is a decentralized exchange for 24/7 self-custodial trading of tokenized stocks, indices, and commodities alongside crypto perpetuals. Incubated by dYdX Labs with Robinhood, it runs on Robinhood Chain (Arbitrum-based L2) and launched zero-fee spot trading of 95 Stock Tokens on July 1, 2026. Led by founder/CEO Eddie Zhang, with dYdX founder Antonio Juliano on its board. It is a separate entity from dYdX Chain.
