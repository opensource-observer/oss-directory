name: automated-ai-web-researcher-ollama-theblewish
display_name: Automated Ai Web Researcher Ollama Theblewish
description:
  A python program that turns an LLM, running on Ollama, into an automated
  researcher, which will with a single query determine focus areas to investigate,
  do websearches and scrape content from various relevant websites and do research
  for you all on its own! And more, not limited to but including saving the findings
  for you!
