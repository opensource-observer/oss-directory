display_name: Alltalk Tts
---
description:
  AllTalk is based on the Coqui TTS engine, similar to the Coqui_tts extension for Text
  generation webUI, however supports a variety of advanced features, such as a settings
  page, low VRAM support, DeepSpeed, narrator, model finetuning, custom models, wav
  file maintenance. It can also be used with 3rd Party software via JSON calls.
