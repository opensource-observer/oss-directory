description:
  This custom Home Assistant integration automatically scans your entities,
  detects new devices, and uses AI (via cloud and local APIs) to suggest tailored
  automations. It supports multiple AI providers, including OpenAI, Anthropic, Google,
  Groq, Ollama and more! The integration provides automation suggestions via HASS
  notifications
