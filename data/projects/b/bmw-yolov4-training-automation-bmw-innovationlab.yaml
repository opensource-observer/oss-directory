description:
  This repository allows you to get started with training a state-of-the-art Deep Learning
  model with little to no configuration needed!  You provide your labeled dataset
  or label your dataset using our BMW-LabelTool-Lite and you can start the training
  right away and monitor it in many different ways like TensorBoard or a custom REST
  API and GUI. NoCode training with YOLOv4 and YOLOV3 has never been so easy.
