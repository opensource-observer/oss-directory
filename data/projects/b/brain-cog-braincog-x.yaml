name: brain-cog-braincog-x
display_name: Brain Cog Braincog X
description:
  Brain-inspired Cognitive Intelligence Engine (BrainCog) is a brain-inspired
  spiking neural network based platform for Brain-inspired Artificial Intelligence
  and simulating brains at multiple scales. The long term goal of BrainCog is to provide
  a comprehensive theory and system to decode the mechanisms and principles of human
  intelligence and its evolution, and develop artificial brains for brain-inspired
  conscious living AI in future Human-AI symbiotic Society.
