description: Blackhaven is a reserve-powered liquidity engine built on MegaETH. It aims to solve liquidity capture problems by converting user deposits into reserves that power the ecosystem and capture value through a Backing Arbitrage Module. The protocol also provides bonding infrastructure for other protocols to acquire permanent liquidity.
