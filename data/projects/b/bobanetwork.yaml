description: Boba Network is a multichain Layer 2 scaling solution that uses
  Optimistic Rollup technology. It aims to reduce transaction fees and increase
  processing speed on EVM blockchains. The network also features Hybrid Compute,
  allowing smart contracts to integrate off-chain computation.
