---
description:
  LangChain4j is an idiomatic, open-source Java library for building LLM-powered applications
  on the JVM. It offers a unified API over popular LLM providers and vector stores,
  and makes implementing tool calling (including MCP support), agents and RAG easy.
  It integrates seamlessly with enterprise Java frameworks like Quarkus and Spring
  Boot.
