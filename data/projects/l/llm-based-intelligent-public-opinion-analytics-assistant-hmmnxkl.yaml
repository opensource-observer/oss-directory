version: 7
name: llm-based-intelligent-public-opinion-analytics-assistant-hmmnxkl
display_name: Llm Based Intelligent Public Opinion Analytics Assistant Hmmnxkl
description:
  本项目是一款结合15 个主流平台的 26 个榜单实时数据与大模型分析能力的舆情分析助手。通过前端页面，用户可实现对话式热搜榜单查询、特定主题搜索、话题聚类分析及情感倾向分析。系统支持快捷键控制爬虫启停、多平台数据快速查询与跳转，并能基于新闻详情页内容（即使是视频信息也能挖掘出来）累积分析结果，设置包括邮箱、微信、企业微信、Telegram
  在内的多渠道热点推送任务。
github:
