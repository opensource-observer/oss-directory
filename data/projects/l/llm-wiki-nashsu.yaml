description:
  LLM Wiki is a cross-platform desktop application that turns your documents
  into an organized, interlinked knowledge base — automatically. Instead of traditional
  RAG (retrieve-and-answer from scratch every time), the LLM incrementally builds
  and maintains a persistent wiki from your sources。
