version: 7
name: llama-cpp-agent-maximilian-winter
display_name: Llama Cpp Agent Maximilian Winter
description:
  The llama-cpp-agent framework is a tool designed for easy interaction
  with Large Language Models (LLMs). Allowing users to chat with LLM models, execute
  structured function calls and get structured output. Works also with models not
  fine-tuned to JSON output and function calls.
