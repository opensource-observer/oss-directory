display_name: Lombard
description: Lombard Finance is a protocol focused on transforming Bitcoin from
  a passive store of value into a productive asset within decentralized finance
  (DeFi). It aims to unlock Bitcoin's potential by bridging its economic value
  with DeFi ecosystems, enabling Bitcoin holders to actively participate in
  staking and yield-generation opportunities. Its flagship product, LBTC, is a
  secure Bitcoin liquid staked token (LST) backed 1:1 by native Bitcoin.
