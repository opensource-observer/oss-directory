description:
  DORA (Dataflow-Oriented Robotic Architecture) is middleware designed to streamline
  and simplify the creation of AI-based robotic applications. It offers low latency,
  composable, and distributed dataflow capabilities. Applications are modeled as directed
  graphs, also referred to as pipelines.
