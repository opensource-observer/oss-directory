description:
  "DIPY is the paragon 3D/4D+ medical imaging library in Python. Contains generic methods\
  \ for spatial normalization, signal processing, machine learning,\_statistical analysis\
  \ and visualization of medical images. Additionally, it contains specialized methods\
  \ for computational anatomy including\_diffusion, perfusion and structural imaging."
