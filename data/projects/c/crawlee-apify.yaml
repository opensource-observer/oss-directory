version: 7
name: crawlee-apify
display_name: Crawlee Apify
description:
  Crawlee—A web scraping and browser automation library for Node.js to
  build reliable crawlers. In JavaScript and TypeScript. Extract data for AI, LLMs,
  RAG, or GPTs. Download HTML, PDF, JPG, PNG, and other files from websites. Works
  with Puppeteer, Playwright, Cheerio, JSDOM, and raw HTTP. Both headful and headless
  mode. With proxy rotation.
github:
  - url: https://github.com/apify/crawlee
