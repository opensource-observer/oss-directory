description: Chisino is an instant payout game protocol on MegaETH. Its pioneer game is no-loss scratch cards. Scratch for instant prizes up to $10,000. 55% of cards pay out across 16 prize tiers. Every card you play, win or lose, generates a recovery ticket that works to return what you spent. No permanent loss. The protocol is built on Klarhaus, a prize-linked savings engine that splits each play between instant prizes, entry recovery, and protocol rewards. Deposits are backed 1:1 by stablecoins. All outcomes are determined by onchain VRF. Earn rewards every time you play.
