name: chatterpay
display_name: ChatterPay
description: ChatterPay is a WhatsApp-based crypto payment service that allows users to send and receive digital assets through simple text or audio messages. It aims to make cryptocurrency transactions accessible by eliminating the need for technical expertise or dedicated applications. The platform utilizes account abstraction for secure key management on a layer-2 blockchain.
