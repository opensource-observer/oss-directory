description: evently is a fully onchain prediction market built natively on MegaETH. Users can create and trade on markets covering crypto, politics, culture, business, entertainment and other real-world events. Positions are represented as ERC-1155 tokens and settled in USDm using an LMSR pricing model combined with a hybrid CLOB and AMM architecture. All trades, resolutions, and rewards are executed directly onchain.
