description:
  The first open-source AI-driven tool for automatically generating system-level test
  cases (also known as fuzzing) for web/enterprise applications. Currently targeting
  whitebox and blackbox testing of Web APIs, like REST, GraphQL and RPC (e.g., gRPC
  and Thrift).
