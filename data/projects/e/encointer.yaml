version: 7
name: encointer
display_name: encointer
description: Encointer is a decentralized platform that enables communities to
  create their own local digital currencies. It aims to provide a basic income
  to participants without requiring a state-issued ID. The system uses a unique
  proof-of-personhood mechanism based on physical key-signing meetups to prevent
  misuse.
