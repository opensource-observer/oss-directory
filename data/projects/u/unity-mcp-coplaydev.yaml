description:
  Unity MCP acts as a bridge, allowing AI assistants (like Claude, Cursor) to interact
  directly with your Unity Editor via a local MCP (Model Context Protocol) Client.
  Give your LLM tools to manage assets, control scenes, edit scripts, and automate
  tasks within Unity.
