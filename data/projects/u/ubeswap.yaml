version: 7
name: ubeswap
display_name: Ubeswap
description: Ubeswap is a mobile-first decentralized exchange (DEX) and
  automated market maker (AMM) built on the Celo blockchain. It enables users to
  swap, stake, and farm Celo-based ERC‑20 tokens via permissionless liquidity
  pools. UBE token holders can participate in governance and yield programs.
  Protocol includes both V2 and V3 Uniswap-derived contract infrastructure, with
  minimal modifications.
