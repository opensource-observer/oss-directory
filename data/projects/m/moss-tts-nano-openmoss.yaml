description:
  MOSS-TTS-Nano is an open-source multilingual tiny speech generation model from MOSI.AI
  and the OpenMOSS team. With only 0.1B parameters, it is designed for realtime speech
  generation, can run directly on CPU without a GPU, and keeps the deployment stack
  simple enough for local demos, web serving, and lightweight product integration.
