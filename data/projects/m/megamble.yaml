version: 7
name: megamble
display_name: MEGAMBLE
description: Megamble is a parimutuel prediction market build on MegaETH where players bet on outcomes using USDm. 
Winnings are distributed proportionally to all winners based on their share. Community markets : Users can create their own markets and set the settlement rules. They earn a percentage of all bets placed on their market.
