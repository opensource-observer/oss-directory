version: 7
name: mcl-3dl-at-wat
display_name: Mcl 3Dl At Wat
description:
  A ROS node to perform a probabilistic 3-D/6-DOF localization system for
  mobile robots with 3-D LIDAR(s). It implements pointcloud based Monte Carlo localization
  that uses a reference pointcloud as a map.
github:
  - url: https://github.com/at-wat/mcl_3dl
