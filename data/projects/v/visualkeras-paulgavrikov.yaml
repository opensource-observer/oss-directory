description:
  Visualkeras is a Python package to help visualize Keras (either standalone or included
  in TensorFlow) neural network architectures. It allows easy styling to fit most
  needs. This module supports layered style architecture generation which is great
  for CNNs (Convolutional Neural Networks), and a graph style architecture, which
  works great for most models including plain feed-forward networks.
