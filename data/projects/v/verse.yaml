description: Verse (verse.works) is a curated NFT art marketplace based in London that connects collectors with contemporary artists through exhibitions programmed by leading art-world curators. It supports purchases with both fiat and cryptocurrency and offers custodial wallets so collectors don't need to manage their own crypto wallet. All artworks are minted on Ethereum. Verse is operated by Art Technologies Limited and was founded in 2022 by CEO Jamie Gourlay and CTO Augustinas Malinauskas.
