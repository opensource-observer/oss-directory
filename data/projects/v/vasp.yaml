description: Vasp is a crypto payment app on Starknet that enables users to send tokens via a shareable link. It supports batch sending for airdrops and giveaways, P2P transfers, token swapping, and optional password and expiry settings. Unclaimed funds are automatically refunded to the sender after expiry.
