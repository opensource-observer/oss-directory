description:
  【兼容ollama和其他模型】将何具有OpenAI API调用方法的模型集成到PotPlayer中。它使你在观看视频时能够实时翻译字幕，从而打破语言障碍，提升你的观看体验。
  This real-time subtitle translation plugin integrates OpenAI's ChatGPT API (or any
  model with the same API calling method) into PotPlayer. It enables you to translate
  subtitles on-the-fly while watching videos.
