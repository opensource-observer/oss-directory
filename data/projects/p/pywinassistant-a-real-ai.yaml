name: pywinassistant-a-real-ai
display_name: Pywinassistant A Real Ai
description:
  The first open-source Artificial Narrow Intelligence generalist agentic
  framework Computer-Using-Agent that fully operates graphical-user-interfaces (GUIs)
  by using only natural language. Uses Visualization-of-Thought and Chain-of-Thought
  reasoning to elicit spatial reasoning and perception, emulates, plans and simulates
  synthetic HID interactions.
