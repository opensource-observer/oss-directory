version: 7
name: pix2text-breezedeus
display_name: Pix2Text Breezedeus
description:
  An Open-Source Python3 tool with SMALL models for recognizing layouts,
  tables, math formulas (LaTeX), and text in images, converting them into Markdown
  format. A free alternative to Mathpix, empowering seamless conversion of visual
  content into text-based representations. 80+ languages are supported.
github:
  - url: https://github.com/breezedeus/Pix2Text
