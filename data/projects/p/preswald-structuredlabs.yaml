version: 7
name: preswald-structuredlabs
display_name: Preswald Structuredlabs
description:
  "Preswald is a WASM packager for Python-based interactive data apps:
  bundle full complex data workflows, particularly visualizations, into single files,
  runnable completely in-browser, using Pyodide, DuckDB, Pandas, and Plotly, Matplotlib,
  etc. Build dashboards, reports, and notebooks that run offline, load fast, and share
  like a document."
github:
  - url: https://github.com/StructuredLabs/preswald
