description:
  Turn PDFs and EPUBs into audiobooks, subtitles or videos into dubbed videos (including
  translation), and more. For free. Pandrator uses local models, notably XTTS, including
  voice-cloning (instant, RVC-enhanced, XTTS fine-tuning) and LLM processing. It aspires
  to be a user-friendly app with a GUI, an installer and all-in-one packages.
