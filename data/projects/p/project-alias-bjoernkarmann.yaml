description:
  "Alias is a teachable \u201Cparasite\u201D that is designed to give users more control\
  \ over their smart assistants, both when it comes to customisation and privacy.\
  \ Through a simple app the user can train Alias to react on a custom wake-word/sound,\
  \ and once trained, Alias can take control over your home assistant by activating\
  \ it for you."
