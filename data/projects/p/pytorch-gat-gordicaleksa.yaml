version: 7
name: pytorch-gat-gordicaleksa
display_name: Pytorch Gat Gordicaleksa
description:
  My implementation of the original GAT paper (Veličković et al.). I've
  additionally included the playground.py file for visualizing the Cora dataset, GAT
  embeddings, an attention mechanism, and entropy histograms. I've supported both
  Cora (transductive) and PPI (inductive) examples!
github:
