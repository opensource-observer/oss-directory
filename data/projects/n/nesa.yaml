name: nesa
display_name: Nesa
description: Nesa is a Layer-1 blockchain built for private, verifiable AI inference on-chain. It combines Trusted Execution Environments, secure multi-party computation, and zero-knowledge proofs with a proprietary technique called Equivariant Encryption to run AI model inference on encrypted data with no added latency. A distributed network of node operators ("miners") execute containerized AI models and reach consensus on results, with the native NES token used for gas, staking, and miner/model-owner rewards.
