description: I-ON Digital Corp is a fintech company focused on tokenizing real-world assets, particularly in-situ gold reserves, into regulated digital instruments. Its platform provides infrastructure for issuing asset-backed tokens and integrating them with DeFi and traditional financial systems. The company’s collateral framework supports products such as the ION.au gold-backed token and pmUSD stablecoin infrastructure.
