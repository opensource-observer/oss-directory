description: "Harbor is a synthetic asset protocol that transforms yield-bearing collateral such as USDMY or wstETH into two asset types: haTOKENS (Harbor Anchored Tokens), which are pegged assets like haETH or haBTC that track a price feed and can generate high yields by concentrating collateral yield and trading fees into stability pools, and hsTOKENS (Harbor Sail Tokens), which are rebalancing variable-leverage tokens designed for directional exposure without funding fees, margin calls, or manual risk management, enabled by automatic rebalancing—meaning wherever a price feed exists, yield can be generated."
