# Install the external-prs CLI tool from npm
name: setup-external-pr-tools
description: "Setup the external-prs CLI tool for use in other workflow steps"

runs:
  using: "composite"
  steps:
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: "20.x"

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Install external-prs CLI
      shell: bash
      run: pnpm add @opensource-observer/ops-external-prs@^0.1.0
